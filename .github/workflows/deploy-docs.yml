name: Deploy Docs to GitHub Pages

# 将 VitePress 文档站构建并部署到 GitHub Pages。
# 站点地址：https://android-security-engineer.github.io/objection-skills/
# （base 已在 website/.vitepress/config.ts 中设为 /objection-skills/）

on:
  push:
    branches:
      - master
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# 允许 GitHub Pages 部署所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只允许一个部署任务运行，排队中的后续任务会取消较早的
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build VitePress site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 自动启用仓库的 GitHub Pages 并把 Source 设为 GitHub Actions
          # （首次部署前仓库未启用 Pages，configure-pages 默认不开启，会报 Not Found）
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
